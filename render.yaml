services:
  - type: web
    name: awaregent-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: QDRANT_IN_MEMORY
        value: "true"
      - key: EMBEDDING_MODEL
        value: all-MiniLM-L6-v2
      - key: LLM_MODEL
        value: qwen/qwen3.6-27b
      - key: COLLECTION_NAME
        value: awaregent_kb
      - key: FRONTEND_URL
        sync: false
